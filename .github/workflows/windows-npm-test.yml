name: Windows npm test

on:
  push:
    branches:
      - codex/windows-npm-test-paths
  workflow_dispatch:

jobs:
  npm-test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prove Windows runtime
        shell: pwsh
        run: |
          $platform = node -p "process.platform"
          $nodeVersion = node -p "process.version"
          "nodePlatform=$platform nodeVersion=$nodeVersion"
          if ($platform -ne "win32") {
            throw "Expected nodePlatform=win32, got $platform"
          }

      - name: Run npm test
        run: npm test
